    --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }
  ::selection { background: rgba(120,220,150,0.2); }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted-dim); }

  #app {
    display: flex;
    height: 100vh;
    overflow: hidden;
    animation: appIn .4s cubic-bezier(.16,1,.3,1);
  }
  @keyframes appIn { from { opacity: 0; } to { opacity: 1; } }

  /* ---------- SIDEBAR ---------- */
  #sidebar {
    width: 250px;
    flex-shrink: 0;
    background: var(--glass-sidebar);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    display: flex;
    flex-direction: column;
    transition: margin-left .32s cubic-bezier(.16,1,.3,1), background .2s ease;
    border-right: 1px solid var(--glass-border);
  }
  #sidebar.collapsed { margin-left: -250px; }

  #sidebarBackdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 45;
    opacity: 0;
    transition: opacity .25s ease;
  }

  .sidebar-head { padding: 14px 12px 8px; }

  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 4px 6px 18px;
  }
  .brand .logo-full {
    height: 34px;
    width: auto;
    display: block;
  }
  [data-theme="light"] .logo-full,
  [data-theme="light"] .logo-mark {
    filter: invert(1);
  }

  #newChatBtn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-family: var(--sans);
    font-weight: 500;
    font-size: 13.5px;
    cursor: pointer;
    transition: background .18s cubic-bezier(.4,0,.2,1), border-color .18s ease, transform .12s ease;
  }
  #newChatBtn:hover { background: var(--panel); border-color: var(--muted-dim); }
  #newChatBtn:active { transform: scale(.98); }

  .sidebar-search {
    position: relative;
    margin: 10px 0 4px;
  }
  .sidebar-search svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted-dim);
    pointer-events: none;
  }
  #chatSearchInput {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 30px 8px 30px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color .15s ease, background .15s ease;
  }
  #chatSearchInput::placeholder { color: var(--muted-dim); }
  #chatSearchInput:focus { border-color: var(--muted-dim); }
  #clearSearchBtn {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    padding: 0;
    margin: 0;
    line-height: 0;
    box-sizing: border-box;
    border-radius: 5px;
    transition: color .15s, background .15s;
  }
  #clearSearchBtn svg { display: block; }
  #clearSearchBtn:hover { color: var(--ink); background: var(--panel-hover); }
  .session-empty-msg {
    padding: 18px 10px;
    font-size: 12.5px;
    color: var(--muted-dim);
    text-align: center;
    line-height: 1.6;
  }

  #sessionList {
    flex: 1;
    overflow-y: auto;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .session-group-label {
    font-size: 11px;
    color: var(--muted-dim);
    padding: 6px 10px 4px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  .session-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13.5px;
    position: relative;
    transition: background .15s cubic-bezier(.4,0,.2,1), color .15s ease, transform .1s ease;
    animation: itemIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes itemIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: none; } }
  .session-item:active { transform: scale(.98); }
  .session-item:hover { background: var(--panel); color: var(--ink); }
  .session-item.active { background: var(--panel); color: var(--ink); }
  .session-item .s-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session-item .s-title-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--muted-dim);
    border-radius: 5px;
    color: var(--ink);
    font-size: 13px;
    font-family: var(--sans);
    padding: 2px 6px;
    outline: none;
  }
  .session-item .s-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    flex-shrink: 0;
  }
  .session-item:hover .s-actions { opacity: 1; }
  .session-item .s-actions button {
    background: transparent;
    border: none;
    color: var(--muted-dim);
    padding: 3px;
    border-radius: 4px;
    display: flex;
    cursor: pointer;
  }
  .session-item .s-actions button:hover { color: var(--ink); background: var(--panel-hover); }
  .session-item .s-actions button.danger:hover { color: var(--danger); }

  .sidebar-foot {
    padding: 8px 12px 12px;
    border-top: 1px solid var(--border);
  }
  #settingsBtn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--muted);
    border: none;
    border-radius: 9px;
    padding: 9px 8px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  #settingsBtn:hover { background: var(--panel); color: var(--ink); }

  /* ---------- MAIN ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    flex-shrink: 0;
    border-bottom: 1px solid transparent;
    transition: border-color .2s ease;
  }

  #sidebarToggle {
    background: transparent;
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .15s ease, color .15s ease, transform .12s ease;
  }
  #sidebarToggle:hover { background: var(--panel); color: var(--ink); }
  #sidebarToggle:active { transform: scale(.9) rotate(-6deg); }

  header .chat-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---------- GREETING ---------- */
  #greeting {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    width: 100%;
  }
  #greetingLogo {
    height: 56px;
    width: auto;
    display: block;
    margin-bottom: 20px;
    animation: appIn .5s cubic-bezier(.16,1,.3,1);
  }
  [data-theme="light"] #greetingLogo { filter: invert(1); }
  #greeting h2 {
    font-size: 30px;
    font-weight: 700;
    margin: 0 0 22px;
    line-height: 1.3;
    color: var(--ink);
  }

  #greetingInputSlot { width: 100%; display: flex; justify-content: center; }

  .quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 700px;
    width: 100%;
    margin-top: 16px;
  }
  .quick-action-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink);
    padding: 9px 15px;
    border-radius: 999px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .quick-action-pill:hover { background: var(--panel); border-color: var(--muted-dim); }
  .quick-action-pill svg { flex-shrink: 0; color: var(--muted); }

  /* ---------- CHAT ---------- */
  #chat {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    padding: 12px 16px 8px;
    display: none;
    flex-direction: column;
  }
  #chat.active { display: flex; }

  #chatInner {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 26px;
    padding-bottom: 20px;
  }

  .msg { max-width: 100%; animation: msgIn .32s cubic-bezier(.16,1,.3,1); }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg.user { display: flex; justify-content: flex-end; }
  .msg.bot { display: flex; justify-content: flex-start; width: 100%; }

  .msg-col { display: flex; flex-direction: column; gap: 6px; min-width: 0; max-width: 100%; }
  .msg.bot .msg-col { width: 100%; }

  .bubble {
    line-height: 1.65;
    font-size: var(--msg-font-size);
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--glass-panel);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    padding: 10px 16px;
    border-radius: 20px;
    white-space: pre-wrap;
    max-width: 480px;
  }
  .msg.bot .bubble { padding: 2px 0; }
  .bubble.error { color: var(--danger); }

  .bubble strong { color: var(--ink); font-weight: 700; }
  .bubble em { font-style: italic; }
  .bubble p { margin: 0 0 14px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { margin: 4px 0 14px; padding-left: 22px; }
  .bubble li { margin-bottom: 5px; }
  .bubble h1, .bubble h2, .bubble h3 { margin: 18px 0 10px; line-height: 1.3; }
  .bubble h1 { font-size: 19px; } .bubble h2 { font-size: 17.5px; } .bubble h3 { font-size: 16px; }
  .bubble code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
  }
  .bubble pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 6px 0 14px;
  }
  .bubble pre code { background: none; border: none; padding: 0; color: var(--ink); font-size: 13px; }
  .bubble a { color: #7fb2ff; text-decoration: underline; text-underline-offset: 2px; }
  .bubble blockquote {
    border-left: 3px solid var(--border);
    margin: 6px 0 14px;
    padding: 2px 0 2px 14px;
    color: var(--muted);
  }
  .bubble .katex { color: var(--ink); font-size: 1.05em; }
  .bubble .katex-display {
    overflow-x: auto;
    overflow-y: hidden;
    margin: 10px 0 14px;
    padding-bottom: 2px;
  }
  .bubble .katex-display > .katex { text-align: left; }
  .cursor-blink {
    display: inline-block;
    width: 7px;
    height: 15px;
    background: var(--ink);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.9s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* code window */
  .code-window {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin: 6px 0 14px;
  }
  .code-window-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .code-window-lang {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .code-window-lang svg { color: var(--muted); flex-shrink: 0; }
  .code-copy-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11.5px;
    font-family: var(--sans);
    cursor: pointer;
    padding: 4px 7px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .code-copy-btn:hover { color: var(--ink); background: var(--panel-hover); }
  .code-copy-btn.copied { color: var(--accent); }
  .code-window pre {
    margin: 0;
    border: none;
    border-radius: 0;
    background: transparent;
  }

  .msg-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity .15s;
  }
  .msg:hover .msg-actions { opacity: 1; }
  .msg-actions button {
    background: transparent;
    border: none;
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color .15s, background .15s;
  }
  .msg-actions button:hover { color: var(--ink); background: var(--panel); }
  .msg-actions button.copied { color: var(--accent); }

  .typing { display: flex; gap: 4px; padding: 6px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ---------- INPUT ---------- */
  footer { padding: 10px 16px 20px; flex-shrink: 0; }
  #inputWrap { max-width: 700px; width: 100%; margin: 0 auto; }
  #inputRow {
    display: flex;
    flex-direction: column;
    background: var(--glass-panel);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 10px 34px rgba(0,0,0,0.16);
    border-radius: 18px;
    padding: 10px 12px 8px;
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  #inputRow:focus-within { border-color: var(--muted-dim); box-shadow: 0 10px 38px rgba(61,220,151,0.1); }

  #userInput {
    resize: none;
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14.5px;
    max-height: 200px;
    min-height: 22px;
    padding: 4px 4px 8px;
    line-height: 1.4;
  }
  #userInput::placeholder { color: var(--muted); }

  .input-toolbar { display: flex; align-items: center; justify-content: space-between; }

  #attachBtn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 13px 7px 11px;
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: color .15s ease, border-color .15s ease, background .15s ease, transform .1s ease;
  }
  #attachBtn:hover { color: var(--ink); border-color: var(--muted-dim); background: var(--panel-hover); }
  #attachBtn:active { transform: scale(.95); }

  #sendBtn {
    background: var(--ink);
    color: var(--bg);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .15s cubic-bezier(.4,0,.2,1), opacity .15s ease, box-shadow .15s ease;
  }
  #sendBtn:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
  #sendBtn:active { transform: scale(.92); }
  #sendBtn:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ---------- ATTACHMENTS (images only) ---------- */
  #attachBar {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 2px 10px;
  }
  #attachBar.has-items { display: flex; }

  .attach-chip {
    position: relative;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--panel-hover);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 5px 8px;
    max-width: 190px;
    animation: chipIn .2s cubic-bezier(.16,1,.3,1);
  }
  @keyframes chipIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: none; } }
  .attach-chip.is-loading { opacity: .55; }
  .attach-chip img.chip-thumb {
    width: 30px; height: 30px; border-radius: 6px; object-fit: cover; flex-shrink: 0;
  }
  .attach-chip .chip-meta { min-width: 0; }
  .attach-chip .chip-name {
    font-size: 12px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px;
  }
  .attach-chip .chip-sub { font-size: 10.5px; color: var(--muted); }
  .attach-chip .chip-remove {
    background: var(--bg); color: var(--muted); border: 1px solid var(--border);
    border-radius: 50%; width: 18px; height: 18px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; cursor: pointer; margin-left: 2px;
    transition: color .15s, border-color .15s, transform .1s;
  }
  .attach-chip .chip-remove:hover { color: var(--ink); border-color: var(--muted-dim); }
  .attach-chip .chip-remove:active { transform: scale(.85); }

  .msg-attachments { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
  .msg.user .msg-attachments { margin-bottom: 2px; }
  .msg-attachments .att-image {
    max-width: 220px; max-height: 220px; border-radius: 12px; border: 1px solid var(--glass-border);
    display: block; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .msg-attachments .att-image:hover { transform: scale(1.02); }

  #inputWrap.drag-over #inputRow { border-color: var(--accent); box-shadow: 0 10px 34px rgba(61,220,151,0.18); }

  .hint-row {
    max-width: 700px;
    margin: 8px auto 0;
    display: flex;
    justify-content: center;
    font-size: 11px;
    color: var(--muted-dim);
    text-align: center;
  }

  /* ---------- MODALS ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: var(--overlay-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    animation: overlayIn .18s ease;
  }
  @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }
  .overlay.open { display: flex; }
  .modal-box {
    background: var(--glass-panel);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 360px;
    animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(14px) scale(.97); } to { opacity: 1; transform: none; } }
  .modal-box h3 { margin: 0 0 6px; font-size: 15.5px; }
  .modal-box p.sub { color: var(--muted); font-size: 13px; margin: 0 0 18px; line-height: 1.55; }
  .modal-box .row { display: flex; gap: 8px; margin-top: 4px; }
  .modal-box button.action {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-neutral { background: transparent; color: var(--ink); border: 1px solid var(--border) !important; }
  .btn-neutral:hover { background: var(--panel-hover); }
  .btn-danger { background: var(--danger); color: #2a0a0a; }
  .btn-danger:hover { filter: brightness(1.08); }

  /* ---------- SETTINGS DIALOG ---------- */
  .settings-box {
    background: var(--glass-panel);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    height: 560px;
    max-height: 82vh;
    display: flex;
    overflow: hidden;
    animation: modalIn .25s cubic-bezier(.16,1,.3,1);
  }
  .settings-nav {
    width: 220px;
    flex-shrink: 0;
    background: var(--glass-sidebar);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
  }
  .settings-nav-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 10px;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    width: 28px;
    height: 28px;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--panel-hover); color: var(--ink); }

  .settings-tabs {
    flex: 1;
    overflow-y: auto;
    padding: 6px 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .settings-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 8px;
    color: var(--muted);
    font-size: 13.5px;
    cursor: pointer;
    background: transparent;
    border: none;
    text-align: left;
    font-family: var(--sans);
    width: 100%;
    transition: background .15s ease, color .15s ease;
  }
  .settings-tab svg { flex-shrink: 0; }
  .settings-tab:hover { background: var(--panel-hover); color: var(--ink); }
  .settings-tab.active { background: var(--panel-hover); color: var(--ink); }

  .settings-content {
    flex: 1;
    overflow-y: auto;
    padding: 22px 26px;
  }
  .settings-panel-title {
    font-size: 16px;
    font-weight: 700;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-row-label { font-size: 14px; color: var(--ink); }
  .settings-row-desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.5; max-width: 380px; }

  .settings-select {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13.5px;
    cursor: pointer;
    padding: 6px 4px;
    outline: none;
  }
  .settings-select option { background: var(--panel); color: var(--ink); }

  .settings-text-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 8px 10px;
    outline: none;
    width: 200px;
  }
  .settings-text-input:focus { border-color: var(--muted-dim); }

  .settings-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .settings-btn:hover { background: var(--panel-hover); }
  .settings-btn.danger { color: var(--danger); border-color: var(--danger); }
  .settings-btn.danger:hover { background: rgba(255,107,107,0.08); }

  .settings-about {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 30px 10px 10px;
    gap: 10px;
  }
  .settings-about img { width: 52px; height: 52px; }
  .settings-about h4 { margin: 0; font-size: 16px; color: var(--ink); }
  .settings-about p { margin: 0; font-size: 12.5px; color: var(--muted); max-width: 320px; line-height: 1.6; }

  @media (max-width: 720px) {
    #sidebar {
      position: fixed;
      z-index: 50;
      height: 100%;
      width: min(250px, 82vw);
    }
    #sidebar.collapsed { margin-left: -100%; }
    #sidebar:not(.collapsed) { box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    #sidebar:not(.collapsed) ~ #sidebarBackdrop { display: block; opacity: 1; }

    header { padding: 12px 12px; }
    .chat-title { font-size: 13px; }
    .brand .logo-full { height: 28px; }

    #chat { padding: 8px 10px 4px; }
    #chatInner { gap: 20px; }
    .msg.user .bubble { max-width: 78vw; }
    .msg-actions button { width: 32px; height: 32px; }

    #greeting { padding: 16px; }
    #greetingLogo { height: 44px; margin-bottom: 14px; }
    #greeting h2 { font-size: 22px; margin-bottom: 18px; }
    .quick-actions { gap: 6px; }
    .quick-action-pill { padding: 8px 12px; font-size: 12.5px; }

    footer { padding: 8px 10px calc(14px + env(safe-area-inset-bottom, 0px)); }
    #inputWrap { max-width: 100%; }
    #userInput { font-size: 16px; }

    .settings-box { flex-direction: column; height: 88vh; max-width: 94vw; }
    .settings-nav { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .settings-tabs { flex-direction: row; overflow-x: auto; padding: 0 10px 10px; }
    .settings-tab { flex-shrink: 0; }
    .settings-content { padding: 18px; }
    .settings-text-input { width: 100%; max-width: 220px; }

    .modal-box { max-width: 94vw; }
  }

  @media (max-width: 400px) {
    #greeting h2 { font-size: 19px; }
    .quick-action-pill span { display: none; }
    .quick-action-pill { padding: 9px; border-radius: 50%; }
    #attachBtn .attach-label { display: none; }
    #attachBtn { padding: 8px; border-radius: 50%; }
  }

        <button id="closeSettings" class="icon-btn" title="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="settings-tabs" id="settingsTabs"></div>
    </div>
    <div class="settings-content" id="settingsContent"></div>
  </div>
</div>

<script>
  // ---------- CONFIG ----------
  // API key lives server-side now (see /functions/api/chat.js). Never put it here.
  const MODEL = 'nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free';
  const SYSTEM_PROMPT = "You are AbhayAI, a helpful, friendly assistant. Format replies with markdown where useful (bold for key terms, code blocks for code, lists for steps). Keep answers clear and to the point.";

  const QUICK_ACTIONS = [
    { label: 'Code', starter: 'Help me write code for ', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 4l-6 8 6 8M16 4l6 8-6 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
    { label: 'Write', starter: 'Help me write ', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>' },
    { label: 'Analyze', starter: 'Help me analyze this: ', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 20V10M10 20V4M16 20v-7M22 20V13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
    { label: 'Brainstorm', starter: 'Help me brainstorm ideas for ', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.6.45 1.1 1.15 1.1 1.95V16h5v-.25c0-.8.5-1.5 1.1-1.95A6 6 0 0 0 12 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
    { label: 'Explain', starter: 'Explain how ', icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 11v6M12 7.5v.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>' }
  ];

  // ---------- APPEARANCE ----------
  const THEMES = {
    dark:  { bg:'#131313', sidebar:'#101010', panel:'#1c1c1c', panelHover:'#232323', ink:'#f2f2f2', muted:'#8f8f8f', mutedDim:'#5f5f5f', border:'#262626', accent:'#3ddc97', codeBg:'#0c0c0c', glassPanel:'rgba(28,28,28,0.55)', glassSidebar:'rgba(16,16,16,0.55)', glassBorder:'rgba(255,255,255,0.07)', overlayBg:'rgba(0,0,0,0.5)' },
    light: { bg:'#ffffff', sidebar:'#f7f7f7', panel:'#f0f0f0', panelHover:'#e6e6e6', ink:'#1a1a1a', muted:'#6b6b6b', mutedDim:'#9a9a9a', border:'#e2e2e2', accent:'#1f9e63', codeBg:'#f2f2f2', glassPanel:'rgba(255,255,255,0.55)', glassSidebar:'rgba(247,247,247,0.6)', glassBorder:'rgba(0,0,0,0.06)', overlayBg:'rgba(0,0,0,0.25)' }
  };
  const APPEARANCE_STORAGE = 'abhayai_appearance_v1';
  let appearancePref = localStorage.getItem(APPEARANCE_STORAGE) || 'system';
  const systemDarkQuery = window.matchMedia('(prefers-color-scheme: dark)');

  function resolvedThemeKey() {
    if (appearancePref === 'dark' || appearancePref === 'light') return appearancePref;
    return systemDarkQuery.matches ? 'dark' : 'light';
  }

  function applyAppearance() {
    const key = resolvedThemeKey();
    const t = THEMES[key];
    document.documentElement.setAttribute('data-theme', key);
    const root = document.documentElement.style;
    root.setProperty('--bg', t.bg);
    root.setProperty('--sidebar', t.sidebar);
    root.setProperty('--panel', t.panel);
    root.setProperty('--panel-hover', t.panelHover);
    root.setProperty('--ink', t.ink);
    root.setProperty('--muted', t.muted);
    root.setProperty('--muted-dim', t.mutedDim);
    root.setProperty('--border', t.border);
    root.setProperty('--accent', t.accent);
    root.setProperty('--code-bg', t.codeBg);
    root.setProperty('--glass-panel', t.glassPanel);
    root.setProperty('--glass-sidebar', t.glassSidebar);
    root.setProperty('--glass-border', t.glassBorder);
    root.setProperty('--overlay-bg', t.overlayBg);
  }

  function setAppearance(pref) {
    appearancePref = pref;
    localStorage.setItem(APPEARANCE_STORAGE, pref);
    applyAppearance();
  }

  systemDarkQuery.addEventListener('change', () => {
    if (appearancePref === 'system') applyAppearance();
  });

  // ---------- TEXT SIZE ----------
  const TEXT_SIZE_STORAGE = 'abhayai_textsize_v1';
  const TEXT_SIZES = { small: '13.5px', medium: '15px', large: '17px' };
  let textSizePref = localStorage.getItem(TEXT_SIZE_STORAGE) || 'medium';
  if (!TEXT_SIZES[textSizePref]) textSizePref = 'medium';

  function applyTextSize() {
    document.documentElement.style.setProperty('--msg-font-size', TEXT_SIZES[textSizePref]);
  }

  function setTextSize(pref) {
    if (!TEXT_SIZES[pref]) return;
    textSizePref = pref;
    localStorage.setItem(TEXT_SIZE_STORAGE, pref);
    applyTextSize();
  }
  applyTextSize();

  // ---------- USER NAME (personalization) ----------
  const NAME_STORAGE = 'abhayai_username_v1';
  let USER_NAME = localStorage.getItem(NAME_STORAGE) || 'Abhay';
  function setUserName(name) {
    USER_NAME = name.trim() || 'Abhay';
    localStorage.setItem(NAME_STORAGE, USER_NAME);
    if (!getActive()) setGreeting();
  }

  // ---------- STATE (chats synced to Firestore per account) ----------
  let sessions = [];
  let activeId = null;
  let pendingConfirmAction = null;
  let currentUser = null;
  let sessionsLoaded = false; // becomes true once the initial Firestore load finishes
  let saveTimer = null;

  const userEmailLabel = document.getElementById('userEmailLabel');
  const logoutBtn = document.getElementById('logoutBtn');

  // Debounced write of the whole sessions array to Firestore, keyed by uid.
  // Simple one-document-per-user model: fine for personal chat history size.
  //
  // NOTE: image attachments are stored as base64 dataUrls in memory, which
  // can easily exceed Firestore's 1MB-per-document limit. We strip that
  // data before syncing, so image content won't survive a reload/new
  // device, only the text does. Full image sync would need Firebase
  // Storage instead of Firestore.
  function sanitizeForFirestore(rawSessions) {
    return rawSessions.map(s => ({
      ...s,
      messages: s.messages.map(m => {
        if (!m.attachments || !m.attachments.length) return m;
        return {
          ...m,
          attachments: m.attachments.map(a => ({ id: a.id, kind: a.kind, name: a.name, size: a.size }))
        };
      })
    }));
  }

  function scheduleSave() {
    if (!currentUser || !sessionsLoaded) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      db.collection('chats').doc(currentUser.uid).set({
        sessions: sanitizeForFirestore(sessions),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }).catch(err => console.error('Failed to save chats:', err));
    }, 700);
  }

  async function loadSessionsFromFirestore() {
    try {
      const doc = await db.collection('chats').doc(currentUser.uid).get();
      sessions = (doc.exists && Array.isArray(doc.data().sessions)) ? doc.data().sessions : [];
    } catch (err) {
      console.error('Failed to load chats:', err);
      sessions = [];
    }
    sessionsLoaded = true;
  }

  logoutBtn.addEventListener('click', () => {
    openConfirm('Log out of AbhayAI?', () => {
      auth.signOut();
    });
  });

  // ---------- DOM ----------
  const chatEl = document.getElementById('chat');
  const chatInner = document.getElementById('chatInner');
  const greeting = document.getElementById('greeting');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const fileInput = document.getElementById('fileInput');
  const attachBar = document.getElementById('attachBar');
  let pendingAttachments = []; // { id, kind: 'image'|'file', name, size, dataUrl?, text?, loading? }
  const sessionList = document.getElementById('sessionList');
  const chatSearchInput = document.getElementById('chatSearchInput');
  const clearSearchBtn = document.getElementById('clearSearchBtn');
  const chatTitle = document.getElementById('chatTitle');
  const newChatBtn = document.getElementById('newChatBtn');
  const sidebar = document.getElementById('sidebar');
  const sidebarBackdrop = document.getElementById('sidebarBackdrop');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const greetingText = document.getElementById('greetingText');
  const greetingLogo = document.getElementById('greetingLogo');
  greetingLogo.src = document.querySelector('.brand .logo-full').src;
  const greetingInputSlot = document.getElementById('greetingInputSlot');
  const footerSlot = document.getElementById('footerSlot');
  const inputWrap = document.getElementById('inputWrap');
  const quickActionsEl = document.getElementById('quickActions');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');
  const closeSettings = document.getElementById('closeSettings');
  const settingsTabsEl = document.getElementById('settingsTabs');
  const settingsContentEl = document.getElementById('settingsContent');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmMessage = document.getElementById('confirmMessage');
  const confirmCancel = document.getElementById('confirmCancel');
  const confirmDelete = document.getElementById('confirmDelete');

  // ---------- SETTINGS MODAL ----------
  const SETTINGS_TABS = [
    { id: 'general', label: 'General', icon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M10.3 2.5h3.4l.6 2.3a7.7 7.7 0 0 1 2 .9l2.2-1 2.4 2.4-1 2.2c.4.6.7 1.3.9 2l2.3.6v3.4l-2.3.6a7.7 7.7 0 0 1-.9 2l1 2.2-2.4 2.4-2.2-1a7.7 7.7 0 0 1-2 .9l-.6 2.3h-3.4l-.6-2.3a7.7 7.7 0 0 1-2-.9l-2.2 1-2.4-2.4 1-2.2a7.7 7.7 0 0 1-.9-2l-2.3-.6v-3.4l2.3-.6a7.7 7.7 0 0 1 .9-2l-1-2.2 2.4-2.4 2.2 1a7.7 7.7 0 0 1 2-.9l.6-2.3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.6"/></svg>' },
    { id: 'personalization', label: 'Personalization', icon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.8"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>' },
    { id: 'data', label: 'Data controls', icon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="5.5" rx="7.5" ry="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M4.5 5.5V18c0 1.4 3.4 2.5 7.5 2.5s7.5-1.1 7.5-2.5V5.5M4.5 11.75c0 1.4 3.4 2.5 7.5 2.5s7.5-1.1 7.5-2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>' },
    { id: 'about', label: 'About', icon: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v6M12 7.5v.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>' }
  ];
  let activeSettingsTab = 'general';

  function renderSettingsNav() {
    settingsTabsEl.innerHTML = '';
    SETTINGS_TABS.forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'settings-tab' + (tab.id === activeSettingsTab ? ' active' : '');
      btn.innerHTML = tab.icon + '<span>' + tab.label + '</span>';
      btn.addEventListener('click', () => { activeSettingsTab = tab.id; renderSettingsNav(); renderSettingsPanel(); });
      settingsTabsEl.appendChild(btn);
    });
  }

  function row(labelHtml, controlEl, descText) {
    const r = document.createElement('div');
    r.className = 'settings-row';
    const left = document.createElement('div');
    left.innerHTML = `<div class="settings-row-label">${labelHtml}</div>` + (descText ? `<div class="settings-row-desc">${descText}</div>` : '');
    r.appendChild(left);
    r.appendChild(controlEl);
    return r;
  }

  function renderSettingsPanel() {
    settingsContentEl.innerHTML = '';

    if (activeSettingsTab === 'general') {
      const title = document.createElement('div');
      title.className = 'settings-panel-title';
      title.textContent = 'General';
      settingsContentEl.appendChild(title);

      const select = document.createElement('select');
      select.className = 'settings-select';
      select.innerHTML = `
        <option value="system">System</option>
        <option value="dark">Dark</option>
        <option value="light">Light</option>`;
      select.value = appearancePref;
      select.addEventListener('change', () => setAppearance(select.value));
      settingsContentEl.appendChild(row('Appearance', select, 'Choose how AbhayAI looks. System matches your device setting.'));

      const sizeSelect = document.createElement('select');
      sizeSelect.className = 'settings-select';
      sizeSelect.innerHTML = `
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>`;
      sizeSelect.value = textSizePref;
      sizeSelect.addEventListener('change', () => setTextSize(sizeSelect.value));
      settingsContentEl.appendChild(row('Text size', sizeSelect, 'Adjust the size of message text in chat.'));
    }

    if (activeSettingsTab === 'personalization') {
      const title = document.createElement('div');
      title.className = 'settings-panel-title';
      title.textContent = 'Personalization';
      settingsContentEl.appendChild(title);

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'settings-text-input';
      input.placeholder = 'Your name';
      input.value = USER_NAME;
      input.addEventListener('change', () => setUserName(input.value));
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
      settingsContentEl.appendChild(row('Display name', input, 'Shown in your greeting on the home screen.'));
    }

    if (activeSettingsTab === 'data') {
      const title = document.createElement('div');
      title.className = 'settings-panel-title';
      title.textContent = 'Data controls';
      settingsContentEl.appendChild(title);

      const clearBtn = document.createElement('button');
      clearBtn.className = 'settings-btn danger';
      clearBtn.textContent = 'Clear all chats';
      clearBtn.addEventListener('click', () => {
        openConfirm('This will permanently delete all your chats. This can\'t be undone.', () => {
          sessions = [];
          activeId = null;
          renderAll();
        });
      });
      settingsContentEl.appendChild(row('Chat history', clearBtn, 'Chats live only in this browser tab and are already cleared automatically when you close it.'));
    }

    if (activeSettingsTab === 'about') {
      const wrap = document.createElement('div');
      wrap.className = 'settings-about';
      wrap.innerHTML = `
        <img class="logo-mark" src="${document.querySelector('link[rel="icon"]').href}" alt="AbhayAI">
        <h4>AbhayAI</h4>
        <p>A personal AI assistant built for Abhay Lab. Nothing you type is saved once you close this tab.</p>`;
      settingsContentEl.appendChild(wrap);
    }
  }

  settingsBtn.addEventListener('click', () => {
    activeSettingsTab = 'general';
    renderSettingsNav();
    renderSettingsPanel();
    settingsOverlay.classList.add('open');
  });
  closeSettings.addEventListener('click', () => settingsOverlay.classList.remove('open'));
  settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) settingsOverlay.classList.remove('open'); });

  // ---------- CONFIRM MODAL (generic) ----------
  function openConfirm(message, onConfirm) {
    confirmMessage.textContent = message;
    pendingConfirmAction = onConfirm;
    confirmOverlay.classList.add('open');
  }
  confirmCancel.addEventListener('click', () => { pendingConfirmAction = null; confirmOverlay.classList.remove('open'); });
  confirmOverlay.addEventListener('click', (e) => { if (e.target === confirmOverlay) { pendingConfirmAction = null; confirmOverlay.classList.remove('open'); } });
  confirmDelete.addEventListener('click', () => {
    if (pendingConfirmAction) pendingConfirmAction();
    pendingConfirmAction = null;
    confirmOverlay.classList.remove('open');
  });

  // ---------- DELETE CONFIRM (per chat) ----------
  function askDeleteConfirm(session) {
    openConfirm(`This will permanently delete "${session.title}". This can't be undone.`, () => {
      sessions = sessions.filter(s => s.id !== session.id);
      if (activeId === session.id) {
        activeId = sessions.length ? sessions[0].id : null;
      }
      renderAll();
    });
  }

  // ---------- GREETING ----------
  function setGreeting() {
    greetingText.textContent = 'How can I help you today?';
  }
  function renderQuickActions() {
    quickActionsEl.innerHTML = '';
    QUICK_ACTIONS.forEach(action => {
      const pill = document.createElement('button');
      pill.className = 'quick-action-pill';
      pill.innerHTML = `${action.icon}<span>${action.label}</span>`;
      pill.addEventListener('click', () => {
        userInput.value = action.starter;
        userInput.focus();
        userInput.setSelectionRange(userInput.value.length, userInput.value.length);
        userInput.dispatchEvent(new Event('input'));
      });
      quickActionsEl.appendChild(pill);
    });
  }

  // ---------- SESSIONS ----------
  function createSession() {
    const id = 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
    sessions.unshift({
      id,
      title: 'New chat',
      titled: false,
      messages: [{ role: 'system', content: SYSTEM_PROMPT }]
    });
    return id;
  }
  function getActive() { return sessions.find(s => s.id === activeId); }

  let sessionSearchQuery = '';

  function renderSessionList() {
    scheduleSave();
    sessionList.innerHTML = '';
    const query = sessionSearchQuery.trim().toLowerCase();
    const filtered = query
      ? sessions.filter(s => {
          if (s.title.toLowerCase().includes(query)) return true;
          return s.messages.some(m => (m.content || '').toLowerCase().includes(query));
        })
      : sessions;

    if (filtered.length) {
      const label = document.createElement('div');
      label.className = 'session-group-label';
      label.textContent = query ? 'Results' : 'Recent';
      sessionList.appendChild(label);
    } else if (query) {
      const empty = document.createElement('div');
      empty.className = 'session-empty-msg';
      empty.textContent = `No chats found for "${sessionSearchQuery.trim()}"`;
      sessionList.appendChild(empty);
    }

    filtered.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === activeId ? ' active' : '');

      const title = document.createElement('span');
      title.className = 's-title';
      title.textContent = s.title;

      const actions = document.createElement('div');
      actions.className = 's-actions';

      const renameBtn = document.createElement('button');
      renameBtn.title = 'Rename';
      renameBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 20h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>';
      renameBtn.addEventListener('click', (e) => { e.stopPropagation(); startRename(item, s); });

      const delBtn = document.createElement('button');
      delBtn.className = 'danger';
      delBtn.title = 'Delete';
      delBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      delBtn.addEventListener('click', (e) => { e.stopPropagation(); askDeleteConfirm(s); });

      actions.appendChild(renameBtn);
      actions.appendChild(delBtn);
      item.appendChild(title);
      item.appendChild(actions);

      item.addEventListener('click', () => {
        if (s.id === activeId) return;
        pruneEmptySession();
        activeId = s.id;
        renderAll();
        if (window.innerWidth <= 720) sidebar.classList.add('collapsed');
      });
      item.addEventListener('dblclick', () => startRename(item, s));

      sessionList.appendChild(item);
    });
  }

  chatSearchInput.addEventListener('input', () => {
    sessionSearchQuery = chatSearchInput.value;
    clearSearchBtn.hidden = !sessionSearchQuery.trim();
    renderSessionList();
  });
  clearSearchBtn.addEventListener('click', () => {
    chatSearchInput.value = '';
    sessionSearchQuery = '';
    clearSearchBtn.hidden = true;
    renderSessionList();
    chatSearchInput.focus();
  });

  function startRename(item, s) {
    const existingTitle = item.querySelector('.s-title');
    if (!existingTitle) return;
    const input = document.createElement('input');
    input.className = 's-title-input';
    input.value = s.title;
    item.replaceChild(input, existingTitle);
    input.focus();
    input.select();

    function commit() {
      const val = input.value.trim();
      s.title = val || s.title;
      s.titled = true;
      renderAll();
    }
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      if (e.key === 'Escape') { renderAll(); }
    });
    input.addEventListener('blur', commit);
    input.addEventListener('click', (e) => e.stopPropagation());
  }

  function pruneEmptySession() {
    const cur = getActive();
    if (cur && !cur.titled && cur.messages.filter(m => m.role !== 'system').length === 0) {
      sessions = sessions.filter(s => s.id !== cur.id);
    }
  }

  newChatBtn.addEventListener('click', () => {
    pruneEmptySession();
    activeId = createSession();
    renderAll();
    userInput.focus();
    if (window.innerWidth <= 720) sidebar.classList.add('collapsed');
  });

  sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
  sidebarBackdrop.addEventListener('click', () => sidebar.classList.add('collapsed'));

  // ---------- MARKDOWN ----------
  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function renderMarkdown(raw) {
    let text = escapeHtml(raw);

    const codeBlocks = [];
    const codeIconSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M8 4l-6 8 6 8M16 4l6 8-6 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const copyIconSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2"/></svg>';
    text = text.replace(/```([a-zA-Z0-9]*)\n?([\s\S]*?)```/g, (m, lang, code) => {
      const label = lang ? lang.toUpperCase() : 'CODE';
      const cleanCode = code.replace(/\n$/, '');
      codeBlocks.push(
        `<div class="code-window">` +
          `<div class="code-window-header">` +
            `<span class="code-window-lang">${codeIconSvg}${label}</span>` +
            `<button class="code-copy-btn" type="button">${copyIconSvg}<span class="code-copy-label">Copy</span></button>` +
          `</div>` +
          `<pre><code>${cleanCode}</code></pre>` +
        `</div>`
      );
      return `\u0000CB${codeBlocks.length - 1}\u0000`;
    });

    text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    // math: extract before other markdown transforms so LaTeX isn't mangled
    const mathBlocks = [];
    function stashMath(raw, displayMode) {
      const expr = raw.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').trim();
      let html;
      try {
        if (typeof katex !== 'undefined') {
          html = katex.renderToString(expr, { throwOnError: false, displayMode });
        }
      } catch (e) { /* fall through to plain text */ }
      if (html === undefined) {
        html = displayMode ? `$$${expr}$$` : `$${expr}$`;
      }
      mathBlocks.push(html);
      return `\u0000MB${mathBlocks.length - 1}\u0000`;
    }
    text = text.replace(/\$\$([\s\S]+?)\$\$/g, (m, expr) => stashMath(expr, true));
    text = text.replace(/\\\[([\s\S]+?)\\\]/g, (m, expr) => stashMath(expr, true));
    text = text.replace(/\\\(([\s\S]+?)\\\)/g, (m, expr) => stashMath(expr, false));
    text = text.replace(/\$(\S[^\$\n]*\S|\S)\$/g, (m, expr) => stashMath(expr, false));

    text = text.replace(/\*\*([^\*\n]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
    text = text.replace(/\*([^\*\n]+)\*/g, '<em>$1</em>');
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
    text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
    text = text.replace(/^# (.*)$/gm, '<h1>$1</h1>');
    text = text.replace(/^&gt; (.*)$/gm, '<blockquote>$1</blockquote>');

    const lines = text.split('\n');
    let out = [];
    let listBuf = [];
    let listType = null;
    function flushList() {
      if (listBuf.length) {
        const tag = listType === 'ol' ? 'ol' : 'ul';
        out.push(`<${tag}>${listBuf.map(li => `<li>${li}</li>`).join('')}</${tag}>`);
        listBuf = [];
        listType = null;
      }
    }
    for (const line of lines) {
      const ulMatch = line.match(/^\s*[-*]\s+(.*)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.*)$/);
      if (ulMatch) {
        if (listType && listType !== 'ul') flushList();
        listType = 'ul';
        listBuf.push(ulMatch[1]);
      } else if (olMatch) {
        if (listType && listType !== 'ol') flushList();
        listType = 'ol';
        listBuf.push(olMatch[1]);
      } else {
        flushList();
        out.push(line);
      }
    }
    flushList();
    text = out.join('\n');

    text = text.split(/\n{2,}/).map(block => {
      const trimmed = block.trim();
      if (!trimmed) return '';
      if (/^<(h1|h2|h3|ul|ol|blockquote|pre)/.test(trimmed)) return trimmed;
      if (/^\u0000CB\d+\u0000$/.test(trimmed)) return trimmed;
      if (/^\u0000MB\d+\u0000$/.test(trimmed)) return trimmed;
      return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
    }).join('');

    text = text.replace(/\u0000CB(\d+)\u0000/g, (m, i) => codeBlocks[parseInt(i)]);
    text = text.replace(/\u0000MB(\d+)\u0000/g, (m, i) => mathBlocks[parseInt(i)]);

    return text;
  }

  function attachCodeCopyHandlers(container) {
    container.querySelectorAll('.code-copy-btn').forEach(btn => {
      if (btn.dataset.wired) return;
      btn.dataset.wired = '1';
      btn.addEventListener('click', () => {
        const codeEl = btn.closest('.code-window').querySelector('code');
        navigator.clipboard.writeText(codeEl.textContent).then(() => {
          btn.classList.add('copied');
          const label = btn.querySelector('.code-copy-label');
          const prevLabel = label.textContent;
          label.textContent = 'Copied';
          setTimeout(() => { btn.classList.remove('copied'); label.textContent = prevLabel; }, 1200);
        });
      });
    });
  }

  // ---------- ATTACHMENTS (images only) ----------
  const MAX_ATTACHMENTS = 6;
  const MAX_FILE_BYTES = 15 * 1024 * 1024; // 15MB

  function fmtBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function renderAttachBar() {
    attachBar.innerHTML = '';
    attachBar.classList.toggle('has-items', pendingAttachments.length > 0);
    pendingAttachments.forEach(att => {
      const chip = document.createElement('div');
      chip.className = 'attach-chip' + (att.loading ? ' is-loading' : '');

      const img = document.createElement('img');
      img.className = 'chip-thumb';
      img.src = att.dataUrl || '';
      chip.appendChild(img);

      const meta = document.createElement('div');
      meta.className = 'chip-meta';
      const name = document.createElement('div');
      name.className = 'chip-name';
      name.textContent = att.name;
      const sub = document.createElement('div');
      sub.className = 'chip-sub';
      sub.textContent = att.loading ? 'Reading…' : fmtBytes(att.size);
      meta.appendChild(name);
      meta.appendChild(sub);
      chip.appendChild(meta);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'chip-remove';
      removeBtn.title = 'Remove';
      removeBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>';
      removeBtn.addEventListener('click', () => {
        pendingAttachments = pendingAttachments.filter(a => a.id !== att.id);
        renderAttachBar();
      });
      chip.appendChild(removeBtn);

      attachBar.appendChild(chip);
    });
  }

  function handleFiles(fileList) {
    const files = Array.from(fileList);
    for (const file of files) {
      if (!file.type.startsWith('image/')) {
        alert(`"${file.name}" isn't an image. AbhayAI can only see image attachments.`);
        continue;
      }
      if (pendingAttachments.length >= MAX_ATTACHMENTS) {
        alert(`You can attach up to ${MAX_ATTACHMENTS} images at a time.`);
        break;
      }
      if (file.size > MAX_FILE_BYTES) {
        alert(`"${file.name}" is too large (max ${fmtBytes(MAX_FILE_BYTES)}).`);
        continue;
      }

      const id = 'att_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
      const att = { id, name: file.name, size: file.size, loading: true, kind: 'image' };
      pendingAttachments.push(att);
      renderAttachBar();

      const reader = new FileReader();
      reader.onload = () => {
        att.dataUrl = reader.result;
        att.loading = false;
        renderAttachBar();
      };
      reader.onerror = () => {
        pendingAttachments = pendingAttachments.filter(a => a.id !== id);
        renderAttachBar();
        alert(`Could not read "${file.name}".`);
      };
      reader.readAsDataURL(file);
    }
  }

  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFiles(fileInput.files);
    fileInput.value = '';
  });

  ['dragenter', 'dragover'].forEach(evt => {
    inputWrap.addEventListener(evt, (e) => {
      e.preventDefault();
      inputWrap.classList.add('drag-over');
    });
  });
  ['dragleave', 'drop'].forEach(evt => {
    inputWrap.addEventListener(evt, (e) => {
      e.preventDefault();
      inputWrap.classList.remove('drag-over');
    });
  });
  inputWrap.addEventListener('drop', (e) => {
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
      handleFiles(e.dataTransfer.files);
    }
  });

  userInput.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const imageFiles = [];
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        const f = item.getAsFile();
        if (f) imageFiles.push(f);
      }
    }
    if (imageFiles.length) handleFiles(imageFiles);
  });

  // ---------- INPUT ----------
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
  });
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', () => sendMessage());

  // ---------- RENDER ----------
  function renderView() {
    const session = getActive();
    const isEmpty = !session || session.messages.filter(m => m.role !== 'system').length === 0;
    if (isEmpty) {
      chatEl.classList.remove('active');
      greeting.style.display = 'flex';
      chatTitle.textContent = '';
      setGreeting();
      if (inputWrap.parentElement !== greetingInputSlot) greetingInputSlot.appendChild(inputWrap);
    } else {
      greeting.style.display = 'none';
      chatEl.classList.add('active');
      chatTitle.textContent = session.title;
      renderChat(session);
      if (inputWrap.parentElement !== footerSlot) footerSlot.appendChild(inputWrap);
    }
  }

  function scrollToBottom() { chatEl.scrollTop = chatEl.scrollHeight; }

  function renderChat(session) {
    chatInner.innerHTML = '';
    const realMsgs = session.messages.filter(m => m.role !== 'system');
    realMsgs.forEach((m, idx) => {
      chatInner.appendChild(buildMsgEl(m, idx, session));
    });
    scrollToBottom();
  }

  function buildMsgEl(m, idx, session) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');

    const col = document.createElement('div');
    col.className = 'msg-col';

    if (m.role === 'user' && m.attachments && m.attachments.length) {
      const attWrap = document.createElement('div');
      attWrap.className = 'msg-attachments';
      m.attachments.forEach(att => {
        const img = document.createElement('img');
        img.className = 'att-image';
        img.src = att.dataUrl;
        img.alt = att.name;
        img.title = att.name;
        img.addEventListener('click', () => window.open(att.dataUrl, '_blank'));
        attWrap.appendChild(img);
      });
      col.appendChild(attWrap);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (m.error ? ' error' : '');
    bubble.innerHTML = m.role === 'user' ? escapeHtml(m.content) : renderMarkdown(m.content);
    if (m.role === 'assistant') attachCodeCopyHandlers(bubble);
    if (m.role === 'user' && !m.content) bubble.style.display = 'none';

    const actions = document.createElement('div');
    actions.className = 'msg-actions';

    const copyBtn = document.createElement('button');
    copyBtn.title = 'Copy';
    copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="12" height="12" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="2"/></svg>';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(m.content).then(() => {
        copyBtn.classList.add('copied');
        setTimeout(() => copyBtn.classList.remove('copied'), 1200);
      });
    });
    actions.appendChild(copyBtn);

    if (m.role === 'assistant') {
      const retryBtn = document.createElement('button');
      retryBtn.title = 'Retry';
      retryBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 10a8 8 0 0 0-14.9-3.5M4 14a8 8 0 0 0 14.9 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      retryBtn.addEventListener('click', () => retryFrom(idx, session));
      actions.appendChild(retryBtn);
    }

    col.appendChild(bubble);
    col.appendChild(actions);
    wrap.appendChild(col);
    return wrap;
  }

  function renderAll() {
    renderSessionList();
    renderView();
  }

  // ---------- SEND / RETRY (streaming) ----------
  async function sendMessage() {
    const text = userInput.value.trim();
    const attachments = pendingAttachments.filter(a => !a.loading);
    if (!text && !attachments.length) return;
    if (pendingAttachments.some(a => a.loading)) {
      alert('Still reading attachment(s)… try sending again in a moment.');
      return;
    }

    if (!activeId) activeId = createSession();
    const session = getActive();
    if (!session.titled) {
      const titleSrc = text || (attachments[0] ? attachments[0].name : 'New chat');
      session.title = titleSrc.slice(0, 40) + (titleSrc.length > 40 ? '…' : '');
    }
    const msg = { role: 'user', content: text };
    if (attachments.length) msg.attachments = attachments;
    session.messages.push(msg);

    userInput.value = '';
    userInput.style.height = 'auto';
    pendingAttachments = [];
    renderAttachBar();
    renderAll();

    await requestCompletion(session);
  }

  async function retryFrom(displayIdx, session) {
    const realMsgs = session.messages.filter(m => m.role !== 'system');
    const target = realMsgs[displayIdx];
    const realIndex = session.messages.indexOf(target);
    session.messages = session.messages.slice(0, realIndex);
    renderAll();
    await requestCompletion(session);
  }

  function buildApiMessages(msgs) {
    return msgs.map(m => {
      if (m.role === 'user' && m.attachments && m.attachments.length) {
        const textPart = m.content && m.content.trim() ? m.content : 'Describe the attached image(s).';
        const parts = [{ type: 'text', text: textPart }];
        m.attachments.forEach(img => parts.push({ type: 'image_url', image_url: { url: img.dataUrl } }));
        return { role: m.role, content: parts };
      }
      return { role: m.role, content: m.content };
    });
  }

  async function requestCompletion(session) {
    sendBtn.disabled = true;

    const draft = { role: 'assistant', content: '' };
    session.messages.push(draft);

    // Build the streaming message element directly so we can update it live
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const col = document.createElement('div');
    col.className = 'msg-col';
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';
    bubbleEl.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    col.appendChild(bubbleEl);
    wrap.appendChild(col);
    chatInner.appendChild(wrap);
    scrollToBottom();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: MODEL,
          messages: buildApiMessages(session.messages.filter(m => m !== draft)),
          stream: true
        })
      });

      if (!response.ok || !response.body) {
        let errMsg = 'Something went wrong. Please try again.';
        try {
          const data = await response.json();
          if (data && data.error && data.error.message) errMsg = data.error.message;
        } catch {}
        draft.content = errMsg;
        draft.error = true;
        renderChat(session);
        renderSessionList();
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let firstContentToken = true;

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith(':')) continue;
          if (!trimmed.startsWith('data:')) continue;
          const payload = trimmed.slice(5).trim();
          if (payload === '[DONE]') continue;

          let json;
          try { json = JSON.parse(payload); } catch { continue; }

          const delta = json?.choices?.[0]?.delta;
          if (!delta) continue;

          if (delta.content) {
            if (firstContentToken) {
              firstContentToken = false;
              bubbleEl.innerHTML = '';
            }
            draft.content += delta.content;
            bubbleEl.innerHTML = renderMarkdown(draft.content) + '<span class="cursor-blink"></span>';
            attachCodeCopyHandlers(bubbleEl);
            scrollToBottom();
          }
        }
      }

      if (!draft.content) draft.content = '(empty response)';
      bubbleEl.innerHTML = renderMarkdown(draft.content);
      renderChat(session);
      renderSessionList();

    } catch (err) {
      draft.content = 'Something went wrong. Please check your connection and try again.';
      draft.error = true;
      renderChat(session);
      renderSessionList();
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  // ---------- INIT (gated behind auth) ----------
  function initApp() {
    if (window.innerWidth <= 720) sidebar.classList.add('collapsed');
    applyAppearance();
    setGreeting();
    renderQuickActions();
    renderAll();
  }

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = user;
    userEmailLabel.textContent = user.displayName || user.email || 'Account';

    await loadSessionsFromFirestore();
    initApp();
    document.body.classList.add('auth-ready');
  });
</script>

</body>

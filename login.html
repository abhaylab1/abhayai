<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · AbhayAI</title>
<style>
  :root {
    --bg: #131313;
    --panel: #1c1c1c;
    --ink: #f2f2f2;
    --muted: #8f8f8f;
    --border: #262626;
    --accent: #3ddc97;
    --danger: #ff6b6b;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%; margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--sans); display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 100%; max-width: 380px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 28px; margin: 16px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; text-align: center; }
  .sub { color: var(--muted); font-size: 13px; text-align: center; margin: 0 0 24px; }
  label { display: block; font-size: 12.5px; color: var(--muted); margin: 14px 0 6px; }
  input {
    width: 100%; background: #141414; border: 1px solid var(--border); border-radius: 10px;
    color: var(--ink); padding: 11px 12px; font-size: 14px; outline: none; font-family: inherit;
  }
  input:focus { border-color: var(--accent); }
  .primary-btn {
    width: 100%; margin-top: 20px; background: var(--accent); color: #0b0b0b; border: none;
    border-radius: 10px; padding: 12px; font-size: 14.5px; font-weight: 600; cursor: pointer;
  }
  .primary-btn:disabled { opacity: .6; cursor: default; }
  .google-btn {
    width: 100%; margin-top: 12px; background: #fff; color: #1f1f1f; border: none;
    border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .divider {
    display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px;
    margin: 20px 0 4px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .toggle-row { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); }
  .toggle-row button {
    background: none; border: none; color: var(--accent); font-size: 13px; cursor: pointer; padding: 0;
  }
  .error-box {
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); color: var(--danger);
    font-size: 12.5px; padding: 9px 11px; border-radius: 8px; margin-top: 14px; display: none;
  }
  .logo { display: block; margin: 0 auto 16px; width: 44px; height: 44px; border-radius: 12px; }
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%233ddc97'/%3E%3Ctext x='12' y='16.5' font-size='11' font-family='sans-serif' font-weight='700' text-anchor='middle' fill='%230b0b0b'%3EAI%3C/text%3E%3C/svg%3E" alt="AbhayAI">
  <h1 id="formTitle">Welcome back</h1>
  <p class="sub" id="formSub">Sign in to continue to AbhayAI</p>

  <form id="authForm">
    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required minlength="6">

    <button type="submit" class="primary-btn" id="submitBtn">Sign in</button>
  </form>

  <div class="divider">or</div>

  <button class="google-btn" id="googleBtn">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.5 12.3c0-.9-.1-1.6-.2-2.3H12v4.5h6.5c-.1 1-.7 2.6-2 3.6l3.2 2.5c1.9-1.7 3-4.3 3-7.3z"/><path fill="#34A853" d="M12 24c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 1-3.4 1-2.6 0-4.9-1.8-5.7-4.2H3v2.6C4.6 21.4 8 24 12 24z"/><path fill="#FBBC05" d="M6.3 14.9c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2V8.3H3c-.6 1.2-1 2.7-1 4.6s.4 3.4 1 4.6l3.3-2.6z"/><path fill="#EA4335" d="M12 5.4c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 2.4 14.6 1.5 12 1.5 8 1.5 4.6 4.1 3 8.3l3.3 2.6C7.1 8.5 9.4 5.4 12 5.4z"/></svg>
    Continue with Google
  </button>

  <div class="error-box" id="errorBox"></div>

  <div class="toggle-row">
    <span id="toggleText">Don't have an account?</span>
    <button type="button" id="toggleBtn">Sign up</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
  const authForm = document.getElementById('authForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const errorBox = document.getElementById('errorBox');
  const googleBtn = document.getElementById('googleBtn');
  const toggleBtn = document.getElementById('toggleBtn');
  const toggleText = document.getElementById('toggleText');
  const formTitle = document.getElementById('formTitle');
  const formSub = document.getElementById('formSub');

  let mode = 'signin'; // or 'signup'

  // If already signed in, skip straight to the app.
  auth.onAuthStateChanged((user) => {
    if (user) window.location.href = 'index.html';
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }
  function clearError() {
    errorBox.style.display = 'none';
  }

  function friendlyError(err) {
    const map = {
      'auth/invalid-email': 'That email address looks invalid.',
      'auth/user-disabled': 'This account has been disabled.',
      'auth/user-not-found': 'No account found with that email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-credential': 'Incorrect email or password.',
      'auth/email-already-in-use': 'An account already exists with that email.',
      'auth/weak-password': 'Password should be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Try again in a bit.'
    };
    return map[err.code] || err.message || 'Something went wrong. Please try again.';
  }

  toggleBtn.addEventListener('click', () => {
    mode = mode === 'signin' ? 'signup' : 'signin';
    clearError();
    if (mode === 'signup') {
      formTitle.textContent = 'Create your account';
      formSub.textContent = 'Sign up to start using AbhayAI';
      submitBtn.textContent = 'Sign up';
      toggleText.textContent = 'Already have an account?';
      toggleBtn.textContent = 'Sign in';
    } else {
      formTitle.textContent = 'Welcome back';
      formSub.textContent = 'Sign in to continue to AbhayAI';
      submitBtn.textContent = 'Sign in';
      toggleText.textContent = "Don't have an account?";
      toggleBtn.textContent = 'Sign up';
    }
  });

  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    submitBtn.disabled = true;
    submitBtn.textContent = mode === 'signup' ? 'Creating account…' : 'Signing in…';

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    try {
      if (mode === 'signup') {
        await auth.createUserWithEmailAndPassword(email, password);
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
      window.location.href = 'index.html';
    } catch (err) {
      showError(friendlyError(err));
      submitBtn.disabled = false;
      submitBtn.textContent = mode === 'signup' ? 'Sign up' : 'Sign in';
    }
  });

  googleBtn.addEventListener('click', async () => {
    clearError();
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await auth.signInWithPopup(provider);
      window.location.href = 'index.html';
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        showError(friendlyError(err));
      }
    }
  });
</script>
</body>
</html>
